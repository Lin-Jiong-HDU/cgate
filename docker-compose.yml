services:
  cgate:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./settings.json:/app/settings.json:ro
      - ./data:/app/data
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_PAT=${GITHUB_PAT}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CGATE_URL=${CGATE_URL}
    restart: unless-stopped
